name: Send weekly email

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Weekly workflow report
          to: ${{ secrets.WEEKLY_EMAIL_TO }}
          from: ${{ secrets.WEEKLY_EMAIL_FROM }}
          body: |
            This is your scheduled weekly email from the ton-assets repository workflow.
